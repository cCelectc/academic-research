repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
      - id: ruff-format
  - repo: https://github.com/astral-sh/ty-pre-commit
    rev: v0.0.56
    hooks:
      - id: ty
  - repo: local
    hooks:
      - id: sync-requirements
        name: sync requirements from pyproject
        entry: python tools/sync_requirements.py
        language: system
        files: ^pyproject\.toml$
        pass_filenames: false
